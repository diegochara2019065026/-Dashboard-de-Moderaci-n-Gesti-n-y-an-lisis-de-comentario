########################################################
#
# Aegis Filter – Docker Compose
# Servicios: app (Laravel) + db (MySQL 8) + phpmyadmin
#
########################################################
version: "3.9"

services:
  # ─── Aplicación Laravel ────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: aegisfilter_app
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      APP_NAME: "Aegis Filter"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost

      LOG_CHANNEL: stack
      LOG_LEVEL: debug

      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: aegisfilter_db
      DB_USERNAME: aegis_user
      DB_PASSWORD: ${DB_PASSWORD:-AegisSecure2024!}

      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
    volumes:
      - ./src:/var/www/html
      - storage_data:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
    networks:
      - aegisfilter_network

  # ─── Base de Datos MySQL 8 ─────────────────────────
  db:
    image: mysql:8.0
    container_name: aegisfilter_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: aegisfilter_db
      MYSQL_USER: aegis_user
      MYSQL_PASSWORD: ${DB_PASSWORD:-AegisSecure2024!}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-RootAegis2024!}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "aegis_user", "-p${DB_PASSWORD:-AegisSecure2024!}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - aegisfilter_network

  # ─── PHPMyAdmin (herramienta de administración) ───
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: aegisfilter_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: aegis_user
      PMA_PASSWORD: ${DB_PASSWORD:-AegisSecure2024!}
      UPLOAD_LIMIT: 50M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - aegisfilter_network

# ─── Volúmenes ───────────────────────────────────────
volumes:
  db_data:
    driver: local
  storage_data:
    driver: local

# ─── Red ─────────────────────────────────────────────
networks:
  aegisfilter_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
