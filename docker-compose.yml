########################################################
#
# Aegis Filter – Docker Compose
# Servicios: app (Laravel) + db (MySQL 8) + phpmyadmin
#
########################################################
version: "3.9"

services:
  # ─── Aplicación Laravel ────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: aegisfilter_app
    restart: unless-stopped
    ports:
      # En VPS con Caddy: cambiar APP_HTTP_PORT (en .env) a un puerto libre,
      # ya que Caddy ocupará el 80/443 del host. En local se deja en 80.
      - "${APP_HTTP_PORT:-80}:80"
    environment:
      APP_NAME: "Aegis Filter"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost

      LOG_CHANNEL: stack
      LOG_LEVEL: debug

      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: aegisfilter_db
      DB_USERNAME: aegis_user
      DB_PASSWORD: ${DB_PASSWORD:-AegisSecure2024!}

      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
    volumes:
      - ./src:/var/www/html
      - storage_data:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
    networks:
      - aegisfilter_network

  # ─── Base de Datos MySQL 8 ─────────────────────────
  db:
    image: mysql:8.0
    container_name: aegisfilter_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: aegisfilter_db
      MYSQL_USER: aegis_user
      MYSQL_PASSWORD: ${DB_PASSWORD:-AegisSecure2024!}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-RootAegis2024!}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "aegis_user", "-p${DB_PASSWORD:-AegisSecure2024!}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - aegisfilter_network

  # ─── PHPMyAdmin (herramienta de administración) ───
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: aegisfilter_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: aegis_user
      PMA_PASSWORD: ${DB_PASSWORD:-AegisSecure2024!}
      UPLOAD_LIMIT: 50M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - aegisfilter_network

  # ─── Alexa Bridge (Nuevo Microservicio) ──────────
  alexa-bridge:
    build:
      context: ./alexa-bridge
      dockerfile: Dockerfile
    container_name: aegisfilter_alexa_bridge
    restart: unless-stopped
    ports:
      # Acceso directo solo para depuración; el tráfico público real
      # pasa por Caddy con TLS. En VPS: usar "127.0.0.1:8090" en .env.
      - "${ALEXA_BRIDGE_BIND:-8090}:8080"
    environment:
      # URL interna del Aegis Core dentro de la red Docker.
      # 'app' es el nombre del servicio Laravel en este compose (puerto 80 = Apache).
      AEGIS_CORE_URL: "http://app:80/api/analyze"

      # Skill ID de tu Alexa Skill (obtenerlo de la consola de Amazon Developer).
      # Se puede definir en un archivo .env en el VPS.
      ALEXA_SKILL_ID: "${ALEXA_SKILL_ID:-}"

      # Activar/desactivar verificación de firma.
      # Usar 'true' en producción (VPS) y 'false' para pruebas locales (sin HTTPS).
      VERIFY_SIGNATURES: "${VERIFY_SIGNATURES:-true}"

      # Timeout en segundos para consultas al Aegis Core
      AEGIS_REQUEST_TIMEOUT: "10"
    depends_on:
      - app
    networks:
      - aegisfilter_network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Caddy (Reverse Proxy + HTTPS automático) ─────
  # Solo para el VPS de producción: levantar con
  #   docker compose --profile proxy up -d
  caddy:
    image: caddy:2-alpine
    container_name: aegisfilter_caddy
    restart: unless-stopped
    profiles:
      - proxy
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_ACME_EMAIL: "${CADDY_ACME_EMAIL:-admin@example.com}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
      - alexa-bridge
    networks:
      - aegisfilter_network


# ─── Volúmenes ───────────────────────────────────────
volumes:
  db_data:
    driver: local
  storage_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

# ─── Red ─────────────────────────────────────────────
networks:
  aegisfilter_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
